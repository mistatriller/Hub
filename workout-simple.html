<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Workout</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a0a;color:#e8e8e0;font-family:-apple-system,sans-serif;padding:14px 14px 80px;max-width:600px;margin:0 auto;}
h1{font-size:1.6rem;font-weight:700;margin-bottom:2px;}
h1 span{color:#c8f05a;}
.date{font-size:0.6rem;color:#555;margin-bottom:16px;letter-spacing:0.1em;text-transform:uppercase;}

/* NAV TABS */
.tab-row{display:flex;gap:4px;background:#111;border:1px solid #1e1e1e;border-radius:8px;padding:3px;margin-bottom:16px;}
.tab{flex:1;font-size:0.58rem;letter-spacing:0.08em;text-transform:uppercase;padding:7px 4px;border-radius:5px;border:none;background:transparent;color:#555;cursor:pointer;text-align:center;}
.tab.active{background:#1a1a1a;color:#e8e8e0;border:1px solid #2a2a2a;}

/* SCREEN */
.screen{display:none;}
.screen.active{display:block;}

/* PLAN CARDS */
.plan-card{background:#141414;border:1px solid #1e1e1e;border-radius:10px;margin-bottom:8px;overflow:hidden;}
.plan-header{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;}
.plan-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.plan-info{flex:1;}
.plan-name{font-size:0.85rem;font-weight:600;}
.plan-sub{font-size:0.58rem;color:#555;margin-top:2px;}
.plan-arrow{font-size:0.65rem;color:#444;transition:transform 0.2s;}
.plan-card.open .plan-arrow{transform:rotate(180deg);}
.plan-body{display:none;border-top:1px solid #1e1e1e;padding:10px 14px 14px;}
.plan-card.open .plan-body{display:block;}
.plan-ex-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #1a1a1a;}
.plan-ex-row:last-child{border-bottom:none;}
.plan-ex-name{flex:1;font-size:0.72rem;color:#ccc;}
.plan-ex-target{font-size:0.58rem;color:#555;}
.plan-ex-edit{background:transparent;border:1px solid #2a2a2a;border-radius:5px;padding:4px 8px;font-size:0.6rem;color:#888;cursor:pointer;}
.plan-ex-del{background:transparent;border:none;color:#444;font-size:0.8rem;cursor:pointer;padding:4px 6px;}
.plan-ex-del:hover{color:#f05a8a;}
.warmup-row{font-size:0.63rem;color:#666;padding:4px 0;border-bottom:1px solid #1a1a1a;}
.warmup-row:last-child{border-bottom:none;}
.sec-lbl{font-size:0.5rem;letter-spacing:0.15em;text-transform:uppercase;color:#555;margin:10px 0 6px;}
.start-btn{width:100%;background:#c8f05a;border:none;border-radius:8px;padding:13px;font-size:0.78rem;font-weight:700;color:#0a0a0a;cursor:pointer;margin-top:10px;letter-spacing:0.05em;}
.start-btn:active{background:#b8e048;}

/* ADD EXERCISE TO PLAN */
.add-ex-plan{display:flex;gap:6px;margin-top:10px;}
.add-ex-plan input{flex:1;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:7px;padding:9px 11px;font-size:0.75rem;color:#e8e8e0;outline:none;}
.add-ex-plan input:focus{border-color:#c8f05a;}
.add-ex-plan button{background:#c8f05a;border:none;border-radius:7px;padding:9px 13px;font-size:0.75rem;font-weight:700;color:#0a0a0a;cursor:pointer;}

/* TIMER */
.timer-bar{display:flex;align-items:center;gap:12px;background:#141414;border:1px solid #222;border-radius:10px;padding:11px 14px;margin-bottom:14px;}
.timer-num{font-size:2rem;font-weight:700;color:#c8f05a;letter-spacing:0.05em;flex:1;}
.timer-sub{font-size:0.48rem;letter-spacing:0.1em;text-transform:uppercase;color:#555;margin-top:1px;}
.timer-btn{background:transparent;border:1px solid #333;color:#888;border-radius:7px;padding:7px 14px;font-size:0.7rem;cursor:pointer;white-space:nowrap;}
.timer-btn.running{border-color:#f05a8a;color:#f05a8a;}

/* PROGRESS BAR */
.prog-row{display:flex;justify-content:space-between;margin-bottom:4px;font-size:0.58rem;}
.prog-bar{height:3px;background:#1e1e1e;border-radius:2px;overflow:hidden;margin-bottom:14px;}
.prog-fill{height:100%;background:#c8f05a;border-radius:2px;transition:width 0.3s;}

/* EXERCISE CARDS */
.ex-card{background:#141414;border:1px solid #222;border-radius:10px;margin-bottom:7px;overflow:hidden;}
.ex-card.done{border-color:rgba(200,240,90,0.35);}
.ex-header{display:flex;align-items:center;gap:9px;padding:12px 13px;cursor:pointer;user-select:none;min-height:52px;}
.ex-circle{width:24px;height:24px;border-radius:50%;border:2px solid #333;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:transparent;transition:all 0.2s;}
.ex-card.done .ex-circle{background:#c8f05a;border-color:#c8f05a;color:#0a0a0a;}
.ex-name{flex:1;font-size:0.8rem;font-weight:500;line-height:1.3;}
.ex-card.done .ex-name{color:#555;text-decoration:line-through;}
.ex-target-tag{font-size:0.56rem;color:#555;background:#1a1a1a;padding:3px 7px;border-radius:4px;white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis;}
.ex-del{background:rgba(240,90,138,0.12);border:1px solid rgba(240,90,138,0.25);color:#f05a8a;border-radius:6px;padding:5px 9px;font-size:0.72rem;font-weight:700;cursor:pointer;flex-shrink:0;}
.ex-arrow{font-size:0.62rem;color:#444;flex-shrink:0;transition:transform 0.2s;margin-left:2px;}
.ex-card.open .ex-arrow{transform:rotate(180deg);}
.sets-panel{display:none;border-top:1px solid #1e1e1e;padding:11px 13px;}
.ex-card.open .sets-panel{display:block;}
.ex-note{font-size:0.58rem;color:#888;font-style:italic;margin-bottom:8px;padding:6px 8px;background:#1a1a1a;border-radius:5px;}
.ex-last-tag{font-size:0.54rem;color:#5adcf0;margin-top:2px;}
.ex-last-box{font-size:0.6rem;color:#5adcf0;margin-bottom:8px;padding:7px 9px;background:rgba(90,220,240,0.06);border:1px solid rgba(90,220,240,0.18);border-radius:6px;}
.set-row{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.set-num{font-size:0.6rem;color:#555;width:18px;text-align:center;flex-shrink:0;}
.set-iw{display:flex;flex-direction:column;gap:2px;flex:1;}
.set-ilbl{font-size:0.45rem;letter-spacing:0.1em;text-transform:uppercase;color:#555;}
.set-inp{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:6px;padding:8px 8px;font-size:0.85rem;color:#e8e8e0;width:100%;outline:none;-webkit-appearance:none;text-align:center;}
.set-inp:focus{border-color:#c8f05a;}
.set-del{background:transparent;border:none;color:#444;font-size:0.8rem;cursor:pointer;padding:2px 5px;margin-top:14px;}
.set-del:active{color:#f05a8a;}
.add-set-btn{width:100%;background:transparent;border:1px dashed #2a2a2a;border-radius:6px;padding:9px;color:#555;font-size:0.65rem;cursor:pointer;margin-top:5px;letter-spacing:0.06em;}
.add-set-btn:active{border-color:#c8f05a;color:#c8f05a;}
.mark-done-btn{width:100%;background:rgba(200,240,90,0.07);border:1px solid rgba(200,240,90,0.2);border-radius:6px;padding:9px;color:#c8f05a;font-size:0.65rem;cursor:pointer;margin-top:5px;letter-spacing:0.06em;}
.mark-done-btn:active{background:rgba(200,240,90,0.15);}

/* ADD EXERCISE DURING SESSION */
.sec{font-size:0.52rem;letter-spacing:0.18em;text-transform:uppercase;color:#555;margin:16px 0 8px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:#1e1e1e;}
.type-row{display:flex;gap:5px;margin-bottom:8px;}
.type-opt{flex:1;background:transparent;border:1px solid #2a2a2a;border-radius:6px;padding:7px 4px;font-size:0.58rem;color:#555;cursor:pointer;text-align:center;}
.type-opt.active{border-color:#c8f05a;color:#c8f05a;background:rgba(200,240,90,0.06);}
.add-row{display:flex;gap:7px;}
.add-inp{flex:1;background:#141414;border:1px solid #2a2a2a;border-radius:7px;padding:10px 12px;font-size:0.78rem;color:#e8e8e0;outline:none;}
.add-inp:focus{border-color:#c8f05a;}
.add-btn{background:#c8f05a;border:none;border-radius:7px;padding:10px 15px;font-size:0.75rem;font-weight:700;color:#0a0a0a;cursor:pointer;}

/* NOTES */
.notes-ta{width:100%;background:#141414;border:1px solid #1e1e1e;border-radius:8px;padding:11px;font-size:0.75rem;color:#e8e8e0;resize:none;outline:none;margin-top:12px;font-family:-apple-system,sans-serif;line-height:1.6;}

/* FINISH */
.finish-btn{width:100%;background:#c8f05a;border:none;border-radius:9px;padding:15px;font-size:0.82rem;font-weight:700;color:#0a0a0a;cursor:pointer;margin-top:12px;letter-spacing:0.04em;}
.finish-btn:active{background:#b8e048;}
.finish-btn:disabled{background:#5adcf0;cursor:default;}
/* PARK */
.park-btn{width:100%;background:rgba(90,220,240,0.07);border:1px solid rgba(90,220,240,0.25);border-radius:9px;padding:12px;font-size:0.75rem;font-weight:600;color:#5adcf0;cursor:pointer;margin-top:7px;letter-spacing:0.04em;}
.park-btn:active{background:rgba(90,220,240,0.18);}
/* PARKED SESSION CARDS */
.parked-card{background:#141414;border:2px solid rgba(90,220,240,0.28);border-radius:10px;margin-bottom:8px;padding:12px 14px;}
.parked-badge{display:inline-block;background:rgba(90,220,240,0.1);border:1px solid rgba(90,220,240,0.25);border-radius:4px;font-size:0.47rem;color:#5adcf0;padding:2px 7px;letter-spacing:0.1em;text-transform:uppercase;margin-left:7px;vertical-align:middle;}
.parked-meta{font-size:0.58rem;color:#555;margin:4px 0 6px;}
.parked-ex-preview{font-size:0.6rem;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:10px;}
.parked-actions{display:flex;gap:6px;}
.parked-resume{flex:1;background:#5adcf0;border:none;border-radius:7px;padding:10px;font-size:0.7rem;font-weight:700;color:#0a0a0a;cursor:pointer;}
.parked-resume:active{background:#40c8d8;}
.parked-close{background:transparent;border:1px solid #2a2a2a;border-radius:7px;padding:10px 12px;font-size:0.65rem;color:#888;cursor:pointer;white-space:nowrap;}
.parked-close:active{color:#e8e8e0;border-color:#555;}
.parked-discard{background:transparent;border:1px solid rgba(240,90,138,0.2);border-radius:7px;padding:10px 12px;font-size:0.65rem;color:#f05a8a;cursor:pointer;}

/* HISTORY */
.hist-card{background:#141414;border:1px solid #1e1e1e;border-radius:9px;padding:12px 13px;margin-bottom:7px;}
.hist-name{font-size:0.8rem;font-weight:600;margin-bottom:4px;}
.hist-meta{font-size:0.58rem;color:#555;display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
.hist-ex{font-size:0.63rem;color:#888;padding:3px 0;border-bottom:1px solid #1a1a1a;}
.hist-ex:last-child{border-bottom:none;}
.hist-sets{font-size:0.56rem;color:#555;margin-top:2px;}
.hist-toggle{background:transparent;border:1px solid #2a2a2a;border-radius:5px;padding:5px 10px;font-size:0.58rem;color:#888;cursor:pointer;margin-top:6px;}
.hist-reuse{background:rgba(200,240,90,0.07);border:1px solid rgba(200,240,90,0.25);border-radius:6px;padding:8px 12px;font-size:0.62rem;color:#c8f05a;cursor:pointer;margin-top:8px;width:100%;letter-spacing:0.04em;text-align:center;}
.hist-reuse:active{background:rgba(200,240,90,0.18);}
.from-hist-badge{display:inline-block;background:rgba(200,240,90,0.1);border:1px solid rgba(200,240,90,0.2);border-radius:4px;font-size:0.47rem;color:#c8f05a;padding:2px 7px;letter-spacing:0.1em;text-transform:uppercase;margin-left:7px;vertical-align:middle;}
.from-hist-dismiss{background:transparent;border:none;color:#444;font-size:0.75rem;cursor:pointer;padding:2px 6px;line-height:1;}
.from-hist-dismiss:active{color:#f05a8a;}
.empty{text-align:center;padding:30px 20px;color:#555;font-size:0.65rem;font-style:italic;}

/* CATEGORY GROUPING */
.cat-title{font-size:0.58rem;letter-spacing:0.16em;text-transform:uppercase;color:#666;margin:20px 0 8px;display:flex;align-items:center;gap:8px;}
.cat-title:first-child{margin-top:4px;}
.cat-title span{color:#c8f05a;}
.cat-title::after{content:'';flex:1;height:1px;background:#1e1e1e;}
.new-variant-btn{width:100%;background:transparent;border:1px dashed #2a2a2a;border-radius:8px;padding:10px;color:#666;font-size:0.62rem;cursor:pointer;margin:2px 0 4px;letter-spacing:0.05em;text-align:center;}
.new-variant-btn:active{border-color:#c8f05a;color:#c8f05a;}
.plan-rename-btn{background:transparent;border:1px solid #2a2a2a;border-radius:5px;padding:4px 7px;font-size:0.6rem;color:#666;cursor:pointer;margin-right:2px;flex-shrink:0;}
.plan-rename-btn:active{color:#c8f05a;border-color:#c8f05a;}
.del-variant-btn{width:100%;background:rgba(240,90,138,0.06);border:1px solid rgba(240,90,138,0.2);border-radius:7px;padding:8px;font-size:0.6rem;color:#f05a8a;cursor:pointer;margin-top:8px;letter-spacing:0.04em;text-align:center;}
.del-variant-btn:active{background:rgba(240,90,138,0.15);}
.save-variant-btn{width:100%;background:rgba(167,139,250,0.08);border:1px solid rgba(167,139,250,0.28);border-radius:9px;padding:11px;font-size:0.7rem;font-weight:600;color:#a78bfa;cursor:pointer;margin-top:7px;letter-spacing:0.04em;}
.save-variant-btn:active{background:rgba(167,139,250,0.18);}
.modal select{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:7px;padding:10px 12px;font-size:0.8rem;color:#e8e8e0;outline:none;margin-bottom:10px;-webkit-appearance:none;}
.modal select:focus{border-color:#c8f05a;}

/* MODAL OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:100;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:#141414;border:1px solid #2a2a2a;border-radius:12px 12px 0 0;padding:20px 16px 40px;width:100%;max-width:600px;}
.modal h3{font-size:1rem;font-weight:700;margin-bottom:12px;}
.modal input,.modal textarea{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:7px;padding:10px 12px;font-size:0.8rem;color:#e8e8e0;outline:none;margin-bottom:10px;}
.modal input:focus,.modal textarea:focus{border-color:#c8f05a;}
.modal-btns{display:flex;gap:7px;margin-top:8px;}
.modal-cancel{font-family:-apple-system,sans-serif;font-size:0.62rem;letter-spacing:0.08em;text-transform:uppercase;padding:10px 14px;border-radius:7px;border:1px solid #2a2a2a;background:transparent;color:#555;cursor:pointer;}
.modal-ok{flex:1;font-family:-apple-system,sans-serif;font-size:0.62rem;letter-spacing:0.08em;text-transform:uppercase;padding:10px;border-radius:7px;border:none;background:#c8f05a;color:#0a0a0a;cursor:pointer;font-weight:700;}
.back-btn{background:transparent;border:1px solid #1e1e1e;border-radius:7px;padding:7px 13px;font-size:0.62rem;color:#555;cursor:pointer;margin-bottom:14px;}
</style>
</head>
<body>

<h1>Work<span>out</span></h1>
<div class="date" id="date-lbl"></div>

<div class="tab-row">
  <button class="tab active" onclick="switchTab('plan')">Plan</button>
  <button class="tab" onclick="switchTab('session')">Session</button>
  <button class="tab" onclick="switchTab('history')">History</button>
</div>

<!-- ═══ PLAN SCREEN ═══ -->
<div class="screen active" id="screen-plan">
  <div id="plan-list"></div>
</div>

<!-- ═══ SESSION SCREEN ═══ -->
<div class="screen" id="screen-session">
  <button class="back-btn" onclick="cancelSession()">← Back to Plan</button>
  <div class="timer-bar">
    <div>
      <div class="timer-num" id="timer-disp">00:00</div>
      <div class="timer-sub" id="timer-times"></div>
    </div>
    <div style="text-align:right">
      <div style="font-size:0.5rem;color:#555;margin-bottom:4px">elapsed</div>
      <button class="timer-btn" id="timer-btn" onclick="toggleTimer()">Pause</button>
    </div>
  </div>
  <div class="prog-row"><span style="color:#555;font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase">Progress</span><span style="color:#c8f05a;font-size:0.58rem" id="prog-lbl">0/0</span></div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div id="ex-list"></div>
  <div class="sec">Add Exercise</div>
  <div class="type-row">
    <div class="type-opt active" onclick="setAddType('reps',this)">Reps+Weight</div>
    <div class="type-opt" onclick="setAddType('timed',this)">Timed</div>
    <div class="type-opt" onclick="setAddType('bw',this)">Bodyweight</div>
  </div>
  <div class="add-row">
    <input class="add-inp" id="add-inp" type="text" placeholder="Exercise name..." autocomplete="off">
    <button class="add-btn" onclick="addExSession()">Add</button>
  </div>
  <textarea class="notes-ta" id="session-notes" rows="2" placeholder="Notes — energy, PRs, how it felt..."></textarea>
  <button class="finish-btn" id="finish-btn" onclick="finishSession()">✓ Finish & Save</button>
  <button class="park-btn" id="park-btn" onclick="parkSession()">⏸ Park — resume later today</button>
  <button class="save-variant-btn" id="save-variant-btn" onclick="openSaveVariantModal()">💾 Save as New Variant</button>
</div>

<!-- ═══ HISTORY SCREEN ═══ -->
<div class="screen" id="screen-history">
  <button id="sync-hist-btn" onclick="syncHistoryToSupabase()" style="width:100%;background:transparent;border:1px solid rgba(90,220,240,0.3);border-radius:8px;padding:11px;font-size:0.62rem;letter-spacing:0.08em;text-transform:uppercase;color:#5adcf0;cursor:pointer;margin-bottom:12px">☁ Sync History → Supabase</button>
  <div id="history-list"></div>
</div>

<!-- EDIT EXERCISE MODAL -->
<div class="overlay" id="edit-overlay">
  <div class="modal">
    <h3>Edit Exercise</h3>
    <input id="edit-name" type="text" placeholder="Exercise name">
    <input id="edit-target" type="text" placeholder="Target (e.g. 3×10 @ 90lbs)">
    <input id="edit-note" type="text" placeholder="Note (optional)">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('edit-overlay')">Cancel</button>
      <button class="modal-ok" onclick="confirmEdit()">Save</button>
    </div>
  </div>
</div>

<!-- SAVE AS VARIANT MODAL -->
<div class="overlay" id="variant-overlay">
  <div class="modal">
    <h3>Save as New Variant</h3>
    <input id="variant-name" type="text" placeholder="Name (e.g. Pushing 1)">
    <select id="variant-category"></select>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('variant-overlay')">Cancel</button>
      <button class="modal-ok" onclick="confirmSaveVariant()">Save</button>
    </div>
  </div>
</div>

<script>
// ─── DATE ──────────────────────────────────────────
const TODAY = new Date();
const DKEY = TODAY.toISOString().slice(0,10);
document.getElementById('date-lbl').textContent =
  TODAY.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

// ─── SUPABASE ─────────────────────────────────────
const SB_URL = 'https://vpbveazezdjdlylavrhd.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZwYnZlYXplemRqZGx5bGF2cmhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMDQzNzYsImV4cCI6MjA5NTc4MDM3Nn0.iMg84IMrVYCFUN6S1GPL6n0RF5mRfLJ4s1BGufI5MUw';
const SB_HEADERS = {
  'Content-Type':'application/json',
  'apikey': SB_KEY,
  'Authorization': 'Bearer ' + SB_KEY,
  'Prefer': 'return=minimal'
};
const WO_PREFIX = 'wo_';

async function sbSet(key, value) {
  const raw = JSON.stringify(value);
  // Always write to localStorage immediately
  try { localStorage.setItem(WO_PREFIX+key, raw); } catch(e) {}
  // Fire-and-forget write to Supabase
  try {
    await fetch(`${SB_URL}/rest/v1/hub_data?on_conflict=key`, {
      method:'POST',
      headers:{...SB_HEADERS,'Prefer':'resolution=merge-duplicates,return=minimal'},
      body: JSON.stringify({key:'wo_'+key, value:raw, updated_at:new Date().toISOString()})
    });
  } catch(e) {}
}

async function sbGet(key, def) {
  // Try Supabase first
  try {
    const r = await fetch(`${SB_URL}/rest/v1/hub_data?key=eq.wo_${key}&select=value`, { headers: SB_HEADERS });
    if (r.ok) {
      const rows = await r.json();
      if (rows && rows.length) {
        const val = JSON.parse(rows[0].value);
        // Keep localStorage in sync
        try { localStorage.setItem(WO_PREFIX+key, rows[0].value); } catch(e) {}
        return val;
      }
    }
  } catch(e) {}
  // Fall back to localStorage
  try { const v = localStorage.getItem(WO_PREFIX+key); return v ? JSON.parse(v) : def; } catch(e) { return def; }
}

// ─── STORAGE ──────────────────────────────────────
// Synchronous localStorage wrapper (used for crash recovery / in-session writes)
// For initial data load, use sbGet (async, Supabase-first)
const LS = {
  get:(k,d)=>{try{const v=localStorage.getItem(WO_PREFIX+k)||localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}},
  set:(k,v)=>{sbSet(k,v);}  // dual-write: localStorage (sync in sbSet) + Supabase (async)
};

async function initFromSupabase() {
  try {
    const [prog, draft, parked, hist] = await Promise.all([
      sbGet('program_v2', null),
      sbGet('hw_draft', null),
      sbGet('parked_v1', []),
      sbGet('wo_history_v2', null),
    ]);
    if (prog) program = prog;
    if (draft) historyWorkout = draft;
    if (parked && parked.length) parkedSessions = parked;
    // Seed localStorage with history so renderHistory() can find it
    if (hist) try { localStorage.setItem(WO_PREFIX+'wo_history_v2', JSON.stringify(hist)); } catch(e) {}
  } catch(e) {}
  renderPlan();
  checkRecovery();
}

// ─── VARIANT MANAGEMENT (rename / add / delete) ───
function renameWorkout(wi){
  const w = program[wi];
  if(!w) return;
  const val = prompt('Rename this workout:', w.name);
  if(val!==null && val.trim()){
    w.name = val.trim();
    saveProg(); renderPlan();
    document.getElementById('pc-'+w.id)?.classList.add('open');
  }
}
function addCategoryVariant(catId){
  const cat = CATEGORIES.find(c=>c.id===catId);
  const name = prompt('Name this new '+cat.label+' workout:');
  if(!name || !name.trim()) return;
  const newW = {
    id: catId+'-'+Date.now().toString(36),
    name: name.trim(),
    color: CATEGORY_COLORS[catId] || '#888',
    type: (catId==='z2'||catId==='hiit') ? 'cardio' : 'strength',
    category: catId,
    note: 'Custom variant',
    warmup: [],
    exercises: []
  };
  program.push(newW);
  saveProg(); renderPlan();
  setTimeout(()=>{
    const el = document.getElementById('pc-'+newW.id);
    if(el){ el.classList.add('open'); el.scrollIntoView({behavior:'smooth',block:'start'}); }
  }, 60);
}
function deleteVariant(wi){
  const w = program[wi];
  if(!w) return;
  if(!confirm('Delete "'+w.name+'"? This removes the workout template only — your past History logs are untouched. Can\'t be undone.')) return;
  program.splice(wi,1);
  saveProg(); renderPlan();
}

function togglePlanCard(id){
  document.getElementById('pc-'+id).classList.toggle('open');
}

// ─── PLAN EDITING ─────────────────────────────────
function addWarmup(wi){
  const inp = document.getElementById('wu-inp-'+wi);
  const val = inp.value.trim(); if(!val) return;
  if(!program[wi].warmup) program[wi].warmup=[];
  program[wi].warmup.push(val);
  inp.value=''; saveProg(); renderPlan();
  document.getElementById('pc-'+program[wi].id).classList.add('open');
}
function editWarmup(wi,i){
  const val = prompt('Edit warm-up:', program[wi].warmup[i]);
  if(val!==null){ program[wi].warmup[i]=val.trim(); saveProg(); renderPlan(); document.getElementById('pc-'+program[wi].id).classList.add('open'); }
}
function delWarmup(wi,i){
  program[wi].warmup.splice(i,1); saveProg(); renderPlan();
  document.getElementById('pc-'+program[wi].id).classList.add('open');
}
function addPlanEx(wi){
  const inp = document.getElementById('pex-inp-'+wi);
  const val = inp.value.trim(); if(!val) return;
  program[wi].exercises.push({name:val,type:'reps',target:'',note:''});

  document.getElementById('pc-'+program[wi].id).classList.add('open');
}
function delPlanEx(wi,ei){
  program[wi].exercises.splice(ei,1); saveProg(); renderPlan();
  document.getElementById('pc-'+program[wi].id).classList.add('open');
}

  saveProg(); closeModal('edit-overlay'); renderPlan();
  document.getElementById('pc-'+program[wi].id).classList.add('open');
}

function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));

// ─── SESSION START ─────────────────────────────────
function startSession(wi){
  // If there's an active in-progress session, offer to park it first
  const wip = LS.get(SAVE_KEY, null);
  if(wip && wip.activeWorkout && (wip.exercises||[]).length){
    const choice = confirm(`"${wip.activeWorkout.name}" is still in progress.\n\nOK → Park it (resume later today)\nCancel → Discard it`);
    if(choice){
      parkedSessions.unshift({
        activeWorkout: wip.activeWorkout, exercises: wip.exercises,
        timerSec: wip.timerSec||0, startTime: wip.startTime,
        parkedAt: new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),
        date: DKEY
      });
      saveParkedList();
    }
    localStorage.removeItem(SAVE_KEY);
  }
  const w = wi === -1 ? historyWorkout : program[wi];
  activeWorkout = w;
  exercises = w.exercises.map(e=>({...e,sets:[],done:false}));
  startTime = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  timerSec=0; timerRunning=false; clearInterval(timerInt);
  document.getElementById('timer-disp').textContent='00:00';
  document.getElementById('timer-times').textContent='Started '+startTime;
  document.getElementById('session-notes').value='';
  document.getElementById('finish-btn').disabled=false;
  document.getElementById('finish-btn').textContent='✓ Finish & Save';
  document.getElementById('finish-btn').style.background='#c8f05a';
  // show warm-up if exists
  if(w.warmup && w.warmup.length){
    document.getElementById('session-notes').placeholder =
      'Warm-up:\n'+w.warmup.join('\n')+'\n\nNotes — energy, PRs...';
  }
  saveInProgress();
  renderExList();
  // switch to session tab
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-session').classList.add('active');
  document.querySelector('[onclick="switchTab(\'session\')"]').classList.add('active');
  startTimer();
}

function cancelSession(){
  clearInterval(timerInt); timerRunning=false;
  localStorage.removeItem(SAVE_KEY);
  switchTabDirect('plan');
}
function switchTabDirect(t){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+t).classList.add('active');
  document.querySelector(`[onclick="switchTab('${t}')"]`).classList.add('active');
}

// ─── TIMER ────────────────────────────────────────
function startTimer(){
  timerRunning=true;
  document.getElementById('timer-btn').textContent='Pause';
  document.getElementById('timer-btn').classList.add('running');
  timerInt=setInterval(()=>{
    timerSec++;
    document.getElementById('timer-disp').textContent=
      String(Math.floor(timerSec/60)).padStart(2,'0')+':'+String(timerSec%60).padStart(2,'0');
    saveInProgress();
  },1000);
}
function toggleTimer(){
  const btn=document.getElementById('timer-btn');
  if(timerRunning){clearInterval(timerInt);timerRunning=false;btn.textContent='Resume';btn.classList.remove('running');}
  else startTimer();
}
function timerStr(){ return String(Math.floor(timerSec/60)).padStart(2,'0')+':'+String(timerSec%60).padStart(2,'0'); }

// ─── CRASH RECOVERY ───────────────────────────────
function saveInProgress(){
  LS.set(SAVE_KEY,{exercises,activeWorkout,timerSec,startTime});
}
function checkRecovery(){
  // Auto-save any parked sessions from previous days into history
  const expired = parkedSessions.filter(p => p.date && p.date !== DKEY);
  if(expired.length){
    const hist = LS.get('wo_history_v2',[]);
    expired.forEach(pk=>{
      hist.unshift({
        name: pk.activeWorkout?.name||'Session', color: pk.activeWorkout?.color,
        date: pk.date, startTime: pk.startTime, endTime: '—',
        duration: timerStrFrom(pk.timerSec||0),
        notes: '(auto-saved — parked session)',
        timestamp: new Date().toISOString(),
        exercises: pk.exercises||[],
        exercisesDone: (pk.exercises||[]).filter(e=>e.done).length,
        exercisesTotal: (pk.exercises||[]).length
      });
    });
    LS.set('wo_history_v2', hist);
    parkedSessions = parkedSessions.filter(p => p.date === DKEY);
    saveParkedList();
  }
  // Standard crash recovery for active in-progress session
  const saved=LS.get(SAVE_KEY,null);
  if(!saved||!saved.activeWorkout)return;
  if(confirm('Recover interrupted session: '+saved.activeWorkout.name+'?')){
    activeWorkout=saved.activeWorkout;
    exercises=saved.exercises||[];
    timerSec=saved.timerSec||0;
    startTime=saved.startTime;
    document.getElementById('timer-times').textContent='Started '+(startTime||'');
    renderExList();
    switchTabDirect('session');
    startTimer();
  } else { localStorage.removeItem(SAVE_KEY); }
}

// ─── LAST PERFORMANCE LOOKUP ──────────────────────
function getLastPerformance(exName){
  const hist = LS.get('wo_history_v2', []);
  const target = (exName||'').trim().toLowerCase();
  if(!target) return null;
  for(const s of hist){
    const match = (s.exercises||[]).find(e => (e.name||'').trim().toLowerCase() === target);
    if(match && match.sets && match.sets.length){
      const setsWithData = match.sets.filter(st=>st.weight||st.reps||st.duration);
      if(setsWithData.length) return { date: s.date, sets: setsWithData };
    }
  }
  return null;
}
function formatSetShort(st){
  if(st.duration) return st.duration;
  if(st.weight && st.reps) return st.weight+'×'+st.reps;
  if(st.reps) return st.reps+' reps';
  if(st.weight) return st.weight+'lbs';
  return '';
}
function shortDate(dstr){
  try{ return new Date(dstr+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
  catch(e){ return dstr; }
}

// ─── EXERCISE RENDERING ───────────────────────────
const openCards = new Set();

function renderExList(){
  const list=document.getElementById('ex-list');
  list.innerHTML='';
  exercises.forEach((ex,ei)=>{
    const card=document.createElement('div');
    card.className='ex-card'+(ex.done?' done':'')+(openCards.has(ei)?' open':'');
    card.id='exc-'+ei;
    const lp = getLastPerformance(ex.name);
    const lpStr = lp ? lp.sets.map(formatSetShort).filter(Boolean).join(', ') : '';
    let setsHTML='';
    ex.sets.forEach((set,si)=>{
      if(ex.type==='reps') setsHTML+=`<div class="set-row">
        <div class="set-num">${si+1}</div>
        <div class="set-iw"><div class="set-ilbl">Weight (lbs)</div>
          <input class="set-inp" type="number" inputmode="decimal" value="${set.weight||''}" placeholder="lbs" oninput="updateSet(${ei},${si},'weight',this.value)"></div>
        <div class="set-iw"><div class="set-ilbl">Reps</div>
          <input class="set-inp" type="number" inputmode="numeric" value="${set.reps||''}" placeholder="reps" oninput="updateSet(${ei},${si},'reps',this.value)"></div>
        <button class="set-del" onclick="delSet(${ei},${si})">✕</button></div>`;
      else if(ex.type==='timed') setsHTML+=`<div class="set-row">
        <div class="set-num">${si+1}</div>
        <div class="set-iw"><div class="set-ilbl">Duration</div>
          <input class="set-inp" type="text" value="${set.duration||''}" placeholder="e.g. 60s" oninput="updateSet(${ei},${si},'duration',this.value)"></div>
        <button class="set-del" onclick="delSet(${ei},${si})">✕</button></div>`;
      else setsHTML+=`<div class="set-row">
        <div class="set-num">${si+1}</div>
        <div class="set-iw"><div class="set-ilbl">Reps</div>
          <input class="set-inp" type="number" inputmode="numeric" value="${set.reps||''}" placeholder="reps" oninput="updateSet(${ei},${si},'reps',this.value)"></div>
        <button class="set-del" onclick="delSet(${ei},${si})">✕</button></div>`;
    });
    card.innerHTML=`
      <div class="ex-header" onclick="toggleCard(${ei})">
        <div class="ex-circle" onclick="event.stopPropagation();toggleDone(${ei})">${ex.done?'✓':''}</div>
        <div style="flex:1;min-width:0">
          <div class="ex-name">${ex.name}</div>
          ${ex.target?`<div style="font-size:0.56rem;color:#555;margin-top:1px">${ex.target}</div>`:''}
          ${lpStr?`<div class="ex-last-tag">↻ Last: ${lpStr}</div>`:''}
        </div>
        <button class="ex-del" onclick="event.stopPropagation();removeEx(${ei})">✕</button>
        <div class="ex-arrow">▾</div>
      </div>
      <div class="sets-panel">
        ${lpStr?`<div class="ex-last-box">↻ Last time (${shortDate(lp.date)}): ${lpStr}</div>`:''}
        ${ex.note?`<div class="ex-note">${ex.note}</div>`:''}
        <div id="sets-${ei}">${setsHTML}</div>
        <button class="add-set-btn" onclick="addSet(${ei})">+ Log Set</button>
        <button class="mark-done-btn" onclick="toggleDone(${ei})">${ex.done?'↩ Unmark':'✓ Mark Done'}</button>
      </div>`;
    list.appendChild(card);
  });
  updateProgress();
}

function toggleCard(ei){
  openCards.has(ei)?openCards.delete(ei):openCards.add(ei);
  document.getElementById('exc-'+ei)?.classList.toggle('open');
}
function toggleDone(ei){
  exercises[ei].done=!exercises[ei].done;
  saveInProgress(); renderExList();
  openCards.add(ei);
  document.getElementById('exc-'+ei)?.classList.add('open');
}
function removeEx(ei){
  exercises.splice(ei,1); openCards.clear();
  saveInProgress(); renderExList();
}
function addSet(ei){
  const ex=exercises[ei];
  if(!ex.sets)ex.sets=[];
  ex.sets.push(ex.type==='reps'?{weight:'',reps:''}:ex.type==='timed'?{duration:''}:{reps:''});
  saveInProgress();
  // append without re-render
  const si=ex.sets.length-1;
  const container=document.getElementById('sets-'+ei);
  if(!container){renderExList();openCards.add(ei);return;}
  const row=document.createElement('div');
  row.className='set-row';
  if(ex.type==='reps'){
    row.innerHTML=`<div class="set-num">${si+1}</div>
      <div class="set-iw"><div class="set-ilbl">Weight (lbs)</div>
        <input class="set-inp" type="number" inputmode="decimal" placeholder="lbs" oninput="updateSet(${ei},${si},'weight',this.value)"></div>
      <div class="set-iw"><div class="set-ilbl">Reps</div>
        <input class="set-inp" type="number" inputmode="numeric" placeholder="reps" oninput="updateSet(${ei},${si},'reps',this.value)"></div>
      <button class="set-del" onclick="delSet(${ei},${si})">✕</button>`;
  } else if(ex.type==='timed'){
    row.innerHTML=`<div class="set-num">${si+1}</div>
      <div class="set-iw"><div class="set-ilbl">Duration</div>
        <input class="set-inp" type="text" placeholder="e.g. 60s" oninput="updateSet(${ei},${si},'duration',this.value)"></div>
      <button class="set-del" onclick="delSet(${ei},${si})">✕</button>`;
  } else {
    row.innerHTML=`<div class="set-num">${si+1}</div>
      <div class="set-iw"><div class="set-ilbl">Reps</div>
        <input class="set-inp" type="number" inputmode="numeric" placeholder="reps" oninput="updateSet(${ei},${si},'reps',this.value)"></div>
      <button class="set-del" onclick="delSet(${ei},${si})">✕</button>`;
  }
  container.appendChild(row);
  setTimeout(()=>row.querySelector('input')?.focus(),40);
  updateProgress();
}
function updateSet(ei,si,field,val){
  if(exercises[ei]?.sets[si]){exercises[ei].sets[si][field]=val;saveInProgress();}
}
function delSet(ei,si){
  exercises[ei].sets.splice(si,1);
  saveInProgress(); renderExList(); openCards.add(ei);
  document.getElementById('exc-'+ei)?.classList.add('open');
}
function updateProgress(){
  const done=exercises.filter(e=>e.done).length, total=exercises.length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-lbl').textContent=done+'/'+total;
}

// ─── ADD EXERCISE DURING SESSION ─────────────────
function setAddType(t,el){
  addType=t;
  document.querySelectorAll('.type-opt').forEach(o=>o.classList.remove('active'));
  el.classList.add('active');
}
function addExSession(){
  const inp=document.getElementById('add-inp');
  const name=inp.value.trim(); if(!name) return;
  exercises.push({name,type:addType,target:'',note:'',sets:[],done:false});
  inp.value=''; saveInProgress(); renderExList();
  const idx=exercises.length-1;
  openCards.add(idx);
  setTimeout(()=>{
    document.getElementById('exc-'+idx)?.classList.add('open');
    document.getElementById('exc-'+idx)?.scrollIntoView({behavior:'smooth',block:'nearest'});
  },50);
}
document.getElementById('add-inp').addEventListener('keydown',e=>{if(e.key==='Enter')addExSession();});

// ─── FINISH ───────────────────────────────────────
function finishSession(){
  clearInterval(timerInt); timerRunning=false;
  const endTime=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  const notes=document.getElementById('session-notes').value;
  const session={
    name:activeWorkout.name, color:activeWorkout.color,
    date:DKEY, startTime, endTime, duration:timerStr(),
    notes, timestamp:new Date().toISOString(),
    exercises, exercisesDone:exercises.filter(e=>e.done).length,
    exercisesTotal:exercises.length
  };
  const hkey='wo_history_v2';
  const hist=LS.get(hkey,[]);
  hist.unshift(session);
  LS.set(hkey,hist);
  localStorage.removeItem(SAVE_KEY);
  const btn=document.getElementById('finish-btn');
  btn.textContent='✓ Saved!'; btn.style.background='#5adcf0'; btn.disabled=true;
  setTimeout(()=>switchTabDirect('history'),900);
}

// ─── SAVE ADAPTED SESSION AS NEW VARIANT ──────────
function openSaveVariantModal(){
  if(!activeWorkout){ alert('No active workout to save.'); return; }
  document.getElementById('variant-name').value = activeWorkout.name + ' (adapted)';
  document.getElementById('variant-category').value = activeWorkout.category || 'other';
  document.getElementById('variant-overlay').classList.add('open');
}
function confirmSaveVariant(){
  const name = document.getElementById('variant-name').value.trim();
  const catId = document.getElementById('variant-category').value;
  if(!name){ alert('Please enter a name.'); return; }
  const newW = {
    id: catId+'-'+Date.now().toString(36),
    name,
    color: CATEGORY_COLORS[catId] || activeWorkout.color || '#888',
    type: activeWorkout.type || 'strength',
    category: catId,
    note: 'Saved from session · '+DKEY,
    warmup: activeWorkout.warmup || [],
    exercises: exercises.map(ex=>({name:ex.name, type:ex.type, target:ex.target||'', note:ex.note||''}))
  };
  program.push(newW);
  saveProg();
  closeModal('variant-overlay');
  const catLabel = CATEGORIES.find(c=>c.id===catId)?.label || catId;
  alert('Saved "'+name+'" to your '+catLabel+' variants — find it on the Plan tab.');
}

// ─── PARK & RESUME ────────────────────────────────
function parkSession(){
  if(!activeWorkout) return;
  clearInterval(timerInt); timerRunning = false;
  parkedSessions.unshift({
    activeWorkout, exercises,
    timerSec, startTime,
    parkedAt: new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),
    date: DKEY
  });
  saveParkedList();
  localStorage.removeItem(SAVE_KEY);
  activeWorkout = null; exercises = []; timerSec = 0;
  switchTabDirect('plan');
  renderPlan();
  // Scroll parked card into view
  setTimeout(()=>document.querySelector('.parked-card')?.scrollIntoView({behavior:'smooth',block:'start'}), 60);
}
function resumeParked(i){
  const pk = parkedSessions[i];
  if(!pk) return;
  // If active WIP, park that too before resuming
  const wip = LS.get(SAVE_KEY, null);
  if(wip && wip.activeWorkout && (wip.exercises||[]).length){
    const choice = confirm(`"${wip.activeWorkout.name}" is in progress.\n\nOK → Park it too\nCancel → Discard it`);
    if(choice){
      parkedSessions.splice(i+1, 0, {
        activeWorkout: wip.activeWorkout, exercises: wip.exercises,
        timerSec: wip.timerSec||0, startTime: wip.startTime,
        parkedAt: new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),
        date: DKEY
      });
    }
    localStorage.removeItem(SAVE_KEY);
  }
  // Load parked session
  parkedSessions.splice(i, 1);
  saveParkedList();
  activeWorkout = pk.activeWorkout;
  exercises = pk.exercises;
  timerSec = pk.timerSec || 0;
  startTime = pk.startTime;
  document.getElementById('timer-disp').textContent = timerStrFrom(timerSec);
  document.getElementById('timer-times').textContent = 'Started '+(startTime||'');
  document.getElementById('session-notes').value = '';
  document.getElementById('finish-btn').disabled = false;
  document.getElementById('finish-btn').textContent = '✓ Finish & Save';
  document.getElementById('finish-btn').style.background = '#c8f05a';
  if(pk.activeWorkout?.warmup?.length){
    document.getElementById('session-notes').placeholder =
      'Warm-up:\n'+pk.activeWorkout.warmup.join('\n')+'\n\nNotes — energy, PRs...';
  }
  saveInProgress();
  renderExList();
  switchTabDirect('session');
  startTimer();
}
function saveAndCloseParked(i){
  const pk = parkedSessions[i];
  if(!pk) return;
  parkedSessions.splice(i, 1);
  saveParkedList();
  const endTime = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  const hist = LS.get('wo_history_v2',[]);
  hist.unshift({
    name: pk.activeWorkout?.name||'Session', color: pk.activeWorkout?.color,
    date: pk.date||DKEY, startTime: pk.startTime, endTime,
    duration: timerStrFrom(pk.timerSec),
    notes: '(saved from park)',
    timestamp: new Date().toISOString(),
    exercises: pk.exercises||[],
    exercisesDone: (pk.exercises||[]).filter(e=>e.done).length,
    exercisesTotal: (pk.exercises||[]).length
  });
  LS.set('wo_history_v2', hist);
  renderPlan();
}
function discardParked(i){
  if(!confirm('Discard this parked session? This can\'t be undone.')) return;
  parkedSessions.splice(i, 1);
  saveParkedList();
  renderPlan();
}

// ─── REUSE HISTORY SESSION ────────────────────────
function reuseSession(i){
  const hist = LS.get('wo_history_v2', []);
  const s = hist[i];
  if(!s) return;
  historyWorkout = {
    id: 'from-history',
    name: s.name,
    color: s.color || '#888',
    type: 'strength',
    note: 'From ' + s.date + (s.startTime ? ' · ' + s.startTime : ''),
    warmup: [],
    exercises: (s.exercises || []).map(ex => ({
      name: ex.name,
      type: ex.type || 'reps',
      target: ex.target || '',
      note: ex.note || ''
    }))
  };
  LS.set('hw_draft', historyWorkout);
  switchTabDirect('plan');
  renderPlan();
  setTimeout(()=>{
    const card = document.getElementById('pc-from-history');
    if(card){ card.classList.add('open'); card.scrollIntoView({behavior:'smooth',block:'start'}); }
  }, 60);
}
function dismissHistoryWorkout(){
  historyWorkout = null;
  LS.set('hw_draft', null);
  renderPlan();
}

// ─── HISTORY ──────────────────────────────────────
function renderHistory(){
  const list=document.getElementById('history-list');
  const hist=LS.get('wo_history_v2',[]);
  if(!hist.length){list.innerHTML='<div class="empty">No sessions yet</div>';return;}
  list.innerHTML='';
  hist.forEach((s,i)=>{
    const card=document.createElement('div');
    card.className='hist-card';
    const exLines=(s.exercises||[]).slice(0,5).map(ex=>{
      const setsSummary=(ex.sets||[]).filter(st=>st.weight||st.reps||st.duration)
        .map(st=>st.duration||((st.weight?st.weight+'lbs ':'')+(st.reps?st.reps+' reps':'')))
        .join(' · ');
      return `<div class="hist-ex">${ex.done?'✓':'-'} ${ex.name}${setsSummary?`<div class="hist-sets">${setsSummary}</div>`:''}</div>`;
    }).join('');
    const more=(s.exercises||[]).length>5?`<div class="hist-ex" style="color:#555">+${s.exercises.length-5} more...</div>`:'';
    card.innerHTML=`
      <div class="hist-name">${s.color?`<span style="color:${s.color}">${s.name}</span>`:s.name}</div>
      <div class="hist-meta">
        <span>${s.date}</span>
        <span>${s.startTime||''}${s.endTime?' → '+s.endTime:''}</span>
        <span>${s.duration}</span>
        <span>${s.exercisesDone||0}/${s.exercisesTotal||0} done</span>
      </div>
      ${exLines}${more}
      ${s.notes?`<div style="font-size:0.6rem;color:#888;margin-top:6px;font-style:italic">"${s.notes}"</div>`:''}
      <button class="hist-reuse" onclick="reuseSession(${i})">↩ Use as Today's Workout</button>`;
    list.appendChild(card);
  });
}

// ─── MANUAL SYNC ──────────────────────────────────
async function syncHistoryToSupabase() {
  const btn = document.getElementById('sync-hist-btn');
  btn.textContent = '⏳ Syncing...';
  btn.disabled = true;
  const keys = ['wo_history_v2','program_v2','parked_v1','hw_draft'];
  let ok = 0, fail = 0, lastErr = '';
  for (const key of keys) {
    // Check both prefixed and unprefixed localStorage
    const raw = localStorage.getItem(WO_PREFIX+key) || localStorage.getItem(key);
    if (!raw) continue;
    try {
      const r = await fetch(`${SB_URL}/rest/v1/hub_data?on_conflict=key`, {
        method:'POST',
        headers:{...SB_HEADERS,'Prefer':'resolution=merge-duplicates,return=minimal'},
        body: JSON.stringify({key:'wo_'+key, value:raw, updated_at:new Date().toISOString()})
      });
      if (r.ok) ok++;
      else { const t=await r.text(); lastErr='HTTP '+r.status+': '+t.slice(0,200); fail++; }
    } catch(e) { lastErr=String(e); fail++; }
  }
  btn.disabled = false;
  btn.textContent = '☁ Sync History → Supabase';
  alert('Sync result:\n'+ok+' uploaded, '+fail+' failed'+(lastErr?'\n\nError: '+lastErr:''));
}

// ─── INIT ─────────────────────────────────────────
initFromSupabase();
